<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Details | Bon Realty</title>
  <meta name="description" content="Property listing details — Bon Realty, Southwest Michigan.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --cream:      #F5EFE8;
      --white:      #FFFFFF;
      --coral:      #C97B63;
      --coral-dark: #B0624A;
      --dark:       #2C2420;
      --dark-mid:   #4A3F38;
      --mid:        #7A6960;
      --light:      #C4B5AD;
      --border:     #E2D7CF;
      --serif:      'Cormorant Garamond', Georgia, serif;
      --sans:       'DM Sans', system-ui, sans-serif;
      --max:        1100px;
      --nav-h:      72px;
      --radius:     8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--cream); color: var(--dark); -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }

    /* ── Nav ────────────────────────────────────────────────── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.97);
      border-bottom: 1px solid var(--border);
      height: var(--nav-h);
    }
    .header-inner {
      max-width: var(--max); margin: 0 auto;
      padding: 0 28px; height: 100%;
      display: flex; align-items: center; gap: 28px;
    }
    .logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .logo-monogram {
      width: 40px; height: 40px;
      border: 1.5px solid var(--coral); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--serif); font-size: 0.95rem; font-weight: 600; color: var(--coral);
    }
    .logo-monogram span { color: var(--light); font-weight: 300; }
    .logo-text { display: flex; flex-direction: column; line-height: 1; }
    .logo-bon { font-family: var(--serif); font-size: 1rem; font-weight: 700; letter-spacing: 0.12em; color: var(--dark); }
    .logo-sub { font-family: var(--sans); font-size: 0.55rem; font-weight: 500; letter-spacing: 0.22em; color: var(--mid); text-transform: uppercase; }
    .back-link {
      margin-left: auto;
      font-size: 0.82rem; font-weight: 600;
      color: var(--mid);
      display: flex; align-items: center; gap: 6px;
      transition: color .2s;
    }
    .back-link:hover { color: var(--coral); }

    /* ── Hero Photo ─────────────────────────────────────────── */
    .property-hero {
      position: relative;
      background: var(--dark);
      height: min(62vh, 560px);
      min-height: 320px;
      overflow: hidden;
    }
    .property-hero img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.9;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(44,36,32,0.6) 0%, rgba(44,36,32,0.1) 60%);
    }
    .hero-badge {
      position: absolute;
      top: 20px; left: 28px;
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .badge-active { background: var(--coral); color: #fff; }
    .badge-buyer  { background: #5C8A78;      color: #fff; }
    .badge-seller { background: #7A6B9A;      color: #fff; }

    /* Video button overlay */
    .hero-video-btn {
      position: absolute;
      bottom: 24px; right: 28px;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 40px;
      color: #fff;
      font-size: 0.8rem; font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .hero-video-btn:hover { background: var(--coral); border-color: var(--coral); }
    .hero-video-btn i { font-size: 1rem; }

    /* ── Main Content ─────────────────────────────────────────── */
    .detail-layout {
      max-width: var(--max);
      margin: 0 auto;
      padding: 48px 28px 80px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 48px;
      align-items: start;
    }

    /* Left Column */
    .detail-left {}

    .detail-price {
      font-family: var(--serif);
      font-size: clamp(2.4rem, 5vw, 3.5rem);
      font-weight: 500;
      color: var(--dark);
      margin-bottom: 6px;
    }
    .detail-address {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .detail-city {
      font-size: 0.95rem;
      color: var(--mid);
      margin-bottom: 6px;
    }
    .detail-mls { font-size: 0.8rem; color: var(--light); margin-bottom: 20px; }

    .detail-specs {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      padding: 20px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .spec-item {
      display: flex; flex-direction: column; gap: 2px;
    }
    .spec-value {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--dark);
      line-height: 1;
    }
    .spec-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
    }
    .spec-divider {
      width: 1px;
      background: var(--border);
      align-self: stretch;
    }

    .detail-section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 10px;
    }
    .detail-description {
      font-size: 1rem;
      line-height: 1.85;
      color: var(--dark-mid);
      margin-bottom: 32px;
    }

    .highlights-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 36px;
    }
    .highlight-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--dark-mid);
    }
    .highlight-item i { color: var(--coral); font-size: 0.8rem; flex-shrink: 0; }

    /* Video embed */
    .video-section { margin-bottom: 16px; }
    .video-section-label {
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--mid); margin-bottom: 12px;
    }
    .video-embed {
      aspect-ratio: 16/9;
      background: var(--dark);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .video-embed iframe { width: 100%; height: 100%; border: none; }

    /* Right Column — Sidebar */
    .detail-sidebar {
      position: sticky;
      top: calc(var(--nav-h) + 24px);
    }

    .contact-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: 0 2px 16px rgba(44,36,32,0.08);
      margin-bottom: 16px;
    }
    .contact-card-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .agent-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--cream);
      flex-shrink: 0;
      border: 2px solid var(--coral);
    }
    .agent-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .agent-name { font-family: var(--serif); font-size: 1.1rem; font-weight: 600; }
    .agent-title { font-size: 0.75rem; color: var(--mid); font-weight: 500; }

    .contact-cta-stack { display: flex; flex-direction: column; gap: 10px; }
    .btn-call, .btn-email {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px;
      border-radius: var(--radius);
      font-size: 0.85rem; font-weight: 700;
      letter-spacing: 0.03em;
      transition: background .2s, transform .15s;
    }
    .btn-call  { background: var(--coral); color: #fff; }
    .btn-call:hover  { background: var(--coral-dark); transform: translateY(-1px); }
    .btn-email { background: transparent; color: var(--dark); border: 1.5px solid var(--border); }
    .btn-email:hover { border-color: var(--coral); color: var(--coral); }

    .mls-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px;
      margin-top: 10px;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8rem; font-weight: 600; color: var(--dark-mid);
      transition: background .2s, color .2s;
    }
    .mls-btn:hover { background: var(--border); color: var(--dark); }

    .sidebar-note {
      font-size: 0.75rem;
      color: var(--light);
      text-align: center;
      margin-top: 12px;
      line-height: 1.5;
    }

    /* ── Not Found ──────────────────────────────────────────── */
    .not-found {
      text-align: center;
      padding: 100px 28px;
    }
    .not-found h2 { font-family: var(--serif); font-size: 2rem; margin-bottom: 12px; }
    .not-found p { color: var(--mid); margin-bottom: 24px; }
    .not-found a {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px;
      background: var(--coral); color: #fff;
      border-radius: var(--radius); font-size: 0.85rem; font-weight: 600;
    }

    /* ── Footer ─────────────────────────────────────────────── */
    .site-footer {
      background: var(--dark);
      padding: 24px 28px;
      text-align: center;
    }
    .site-footer p { font-size: 0.78rem; color: rgba(255,255,255,0.35); }
    .site-footer a { color: var(--coral); }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 820px) {
      .detail-layout { grid-template-columns: 1fr; }
      .detail-sidebar { position: static; }
    }
    @media (max-width: 560px) {
      .highlights-grid { grid-template-columns: 1fr; }
      .detail-specs { gap: 16px; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo">
        <div class="logo-monogram">B<span>|</span>R</div>
        <div class="logo-text">
          <span class="logo-bon">BON</span>
          <span class="logo-sub">REALTY</span>
        </div>
      </a>
      <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> All Listings
      </a>
    </div>
  </header>

  <!-- Content injected by JS -->
  <div id="page-content"></div>

  <!-- Footer -->
  <footer class="site-footer">
    <p>&copy; 2025 Bon Realty &nbsp;·&nbsp; 226 South Lincoln Ave, Niles, MI &nbsp;·&nbsp; <a href="tel:2696844445">(269) 684-4445</a></p>
  </footer>

  <script src="data/listings.js"></script>
  <script>
    function fmt(n) { return '$' + Number(n).toLocaleString('en-US'); }

    function badgeClass(cat) {
      return { active: 'badge-active', buyer: 'badge-buyer', seller: 'badge-seller' }[cat] || '';
    }
    function badgeLabel(cat) {
      return { active: 'Active Listing', buyer: 'Buyer Representation', seller: 'Seller Representation' }[cat] || cat;
    }

    /* ── Read ?id param ──────────────────────────────────────── */
    const params  = new URLSearchParams(window.location.search);
    const listingId = params.get('id');
    const listing = LISTINGS.find(l => l.id === listingId);
    const content = document.getElementById('page-content');

    if (!listing) {
      document.title = 'Listing Not Found | Bon Realty';
      content.innerHTML = `
        <div class="not-found">
          <h2>Listing not found.</h2>
          <p>This property may have been removed or the link is no longer valid.</p>
          <a href="index.html"><i class="fas fa-arrow-left"></i> Browse All Listings</a>
        </div>`;
    } else {
      /* Update page title */
      document.title = `${listing.address}, ${listing.city} | Bon Realty`;

      const thumb = listing.photoUrl
        || (listing.videoId ? `https://img.youtube.com/vi/${listing.videoId}/maxresdefault.jpg` : '');

      const heroImg = thumb
        ? `<img src="${thumb}" alt="${listing.address}">`
        : `<div style="width:100%;height:100%;background:var(--border);display:flex;align-items:center;justify-content:center"><i class="fas fa-home" style="font-size:4rem;color:var(--light)"></i></div>`;

      const videoBtn = listing.videoId
        ? `<button class="hero-video-btn" onclick="scrollToVideo()">
             <i class="fas fa-play"></i> Watch Property Tour
           </button>`
        : '';

      const acresRow = listing.acres
        ? `<div class="spec-item"><div class="spec-value">${listing.acres}</div><div class="spec-label">Acres</div></div>
           <div class="spec-divider"></div>`
        : '';

      const sqftRow = listing.sqft
        ? `<div class="spec-item"><div class="spec-value">${listing.sqft.toLocaleString()}</div><div class="spec-label">Sq Ft</div></div>
           <div class="spec-divider"></div>`
        : '';

      const highlightItems = listing.highlights.map(h =>
        `<div class="highlight-item"><i class="fas fa-check-circle"></i> ${h}</div>`
      ).join('');

      const videoSection = listing.videoId ? `
        <div class="video-section" id="video-section">
          <div class="video-section-label">Property Tour Video</div>
          <div class="video-embed">
            <iframe
              src="https://www.youtube.com/embed/${listing.videoId}?rel=0"
              allowfullscreen
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
            </iframe>
          </div>
        </div>` : '';

      const mlsButtonHtml = listing.mlsLink
        ? `<a href="${listing.mlsLink}" target="_blank" class="mls-btn">
             <i class="fas fa-external-link-alt"></i> View Full MLS Details
           </a>`
        : '';

      content.innerHTML = `
        <!-- Hero -->
        <div class="property-hero">
          ${heroImg}
          <div class="hero-overlay"></div>
          <span class="hero-badge ${badgeClass(listing.category)}">${badgeLabel(listing.category)}</span>
          ${videoBtn}
        </div>

        <!-- Detail Layout -->
        <div class="detail-layout">

          <!-- Left -->
          <div class="detail-left">
            <div class="detail-price">${fmt(listing.price)}</div>
            <div class="detail-address">${listing.address}</div>
            <div class="detail-city">${listing.city}, ${listing.state} ${listing.zip}</div>
            ${listing.mlsNumber ? `<div class="detail-mls">MLS# ${listing.mlsNumber}${listing.status ? ' &nbsp;·&nbsp; ' + listing.status : ''}</div>` : ''}

            <div class="detail-specs">
              <div class="spec-item">
                <div class="spec-value">${listing.beds}</div>
                <div class="spec-label">Bedrooms</div>
              </div>
              <div class="spec-divider"></div>
              <div class="spec-item">
                <div class="spec-value">${listing.baths}</div>
                <div class="spec-label">Bathrooms</div>
              </div>
              <div class="spec-divider"></div>
              ${sqftRow}
              ${acresRow}
            </div>

            <div class="detail-section-label">About this property</div>
            <div class="detail-description">${listing.description}</div>

            <div class="detail-section-label">Highlights</div>
            <div class="highlights-grid">${highlightItems}</div>

            ${videoSection}
          </div>

          <!-- Sidebar -->
          <div class="detail-sidebar">
            <div class="contact-card">
              <div class="contact-card-header">
                <div class="agent-avatar">
                  <img
                    src="https://www.bonrealty.com/agents/bethvan_files/stacks-image-4f159f3.jpg"
                    alt="Beth Van"
                    onerror="this.style.display='none'"
                  >
                </div>
                <div>
                  <div class="agent-name">Beth Van</div>
                  <div class="agent-title">Owner-Broker · Bon Realty</div>
                </div>
              </div>
              <div class="contact-cta-stack">
                <a href="tel:2696844445" class="btn-call">
                  <i class="fas fa-phone"></i> Call (269) 684-4445
                </a>
                <a href="mailto:bethvan@bonrealty.com?subject=Inquiry: ${encodeURIComponent(listing.address)}" class="btn-email">
                  <i class="fas fa-envelope"></i> Email Beth
                </a>
                ${mlsButtonHtml}
              </div>
              <p class="sidebar-note">No pressure — just honest conversation about whether this home is right for you.</p>
            </div>
          </div>

        </div>`;
    }

    function scrollToVideo() {
      const el = document.getElementById('video-section');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  </script>
</body>
</html>
